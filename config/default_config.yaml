# Gillsystems AI Stack Updater — Default Configuration
# Gillsystems AI Stack Updater
# Override any of these values via environment variables or --config flag.

# ------------------------------------------------------------
# GPU Architecture Targets
# ------------------------------------------------------------
gpu:
  # AMDGPU_TARGETS passed to CMake when building llama.cpp.
  # auto_detect=true will attempt runtime detection and override this list.
  # Wide range from AMD docs: gfx803,gfx900,gfx906,gfx908,gfx90a,gfx942,
  #   gfx1010,gfx1030,gfx1032,gfx1100,gfx1101,gfx1102
  targets:
    - gfx1100    # RDNA 3 — RX 7900 XTX / 7900 XT / 7900 GRE
    - gfx1101    # RDNA 3 — RX 7800 XT / 7700 XT
    - gfx1102    # RDNA 3 — RX 7600 / 7600 XT
    - gfx1033    # RDNA 2 APU — Steam Deck (Van Gogh)
    - gfx1030    # RDNA 2 — RX 6900 XT / 6800 XT / 6800
    - gfx1032    # RDNA 2 — RX 6700 XT / 6700
    - gfx1010    # RDNA 1 — RX 5700 XT / 5700
    - gfx906     # Vega 20 — Radeon VII / Vega 6 discrete (per AMD docs)
    - gfx90a     # CDNA 2 — Instinct MI200 series
    - gfx942     # CDNA 3 — Instinct MI300 series
  auto_detect: true

# ------------------------------------------------------------
# Install & workspace paths
# ------------------------------------------------------------
paths:
  llama_cpp_install_linux:   "/opt/gillsystems/llama.cpp"   # canonical install root; binaries are also mirrored to <llama_cpp_source>/bin
  llama_cpp_install_windows: "C:\\Gillsystems\\llama.cpp" # canonical install root; binaries are also mirrored to <llama_cpp_source>/bin
  llama_cpp_source:          "~/src/llama.cpp"              # source checkout used for git/cmake; launchers can target the mirrored <source>/bin path
  state_dir:                 "state"                        # runtime state is isolated beneath this root as <state_dir>/<platform>/<node> unless you supply templates
  log_dir:                   "logs"

# ------------------------------------------------------------
# Upstream repositories
# ------------------------------------------------------------
repo:
  # Linux: Defaulting to mainstream ggml-org fork for the latest model architectures (Gemma 4).
  # (AMD's ROCm fork is too far behind for new models).
  llama_cpp_repo:         "https://github.com/ggml-org/llama.cpp.git"
  # Windows: mainstream ggml-org fork (AMD has no native Windows ROCm build docs)
  llama_cpp_repo_windows: "https://github.com/ggml-org/llama.cpp.git"
  rocm_repo_base:         "https://repo.radeon.com/amdgpu-install/latest"
  hip_sdk_download_base:  "https://repo.radeon.com/rocm/msi"

# ------------------------------------------------------------
# Runtime behavior
# ------------------------------------------------------------
behavior:
  dry_run:                   false   # true = show what would happen, make no changes
  auto_yes:                  true    # true = auto-confirm all prompts (fully autonomous)
  force:                     false   # true = re-run all steps even if already done
  verbose:                   false   # true = enable debug logging
  auto_reboot:               true    # false = warn & wait for manual reboot
  reboot_countdown_seconds:  30
  update_python_bindings:    false   # true = also pip install llama-cpp-python
  rocm_usecases:
    - rocm
    - hiplibsdk

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR | CRITICAL
